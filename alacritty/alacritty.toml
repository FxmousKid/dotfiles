[general]

import = [
	"~/.config/alacritty/font.toml",
	"~/.config/alacritty/window.toml",
	"~/.config/alacritty/3024-theme.toml",
]

# hot reload for config
live_config_reload = true

[keyboard]
bindings = [
	{ key = "J", mods = "Alt", chars = "\u001bj" },
	{ key = "K", mods = "Alt", chars = "\u001bk" },
]


[env]
TERM = "xterm-256color"

[general]
import = [
	"~/.config/alacritty/font.toml",
	"~/.config/alacritty/window.toml",
	"~/.config/alacritty/3024-theme.toml",
]

# hot reload for config
live_config_reload = true

[keyboard]
bindings = [
	{ key = "J", mods = "Alt", chars = "\u001bj" },
	{ key = "K", mods = "Alt", chars = "\u001bk" },
	{ key = "Return", mods = "Shift", chars = "\u001B\r" },
	{ key = "W", mods = "Command", action = "ReceiveChar" },
]


[env]
TERM = "xterm-256color"

[colors]
transparent_background_colors = true
